version: "2"
linters:
  enable:
    - gosec
    - misspell
    - prealloc
    - unconvert
    - unparam
  settings:
    gosec:
      excludes:
        - G104
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
          - unparam
        path: _test\.go
      - linters:
          - govet
        text: 'shadow: declaration of "err"'
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/eenemeene/kitamanager-go
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
